<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodduct Page Desgin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contanir">
        <div class="product">
            <div class="gallery">
                <img src="https://wrogn.com/cdn/shop/files/WTTS1538W.webp?v=1742818071" id="product-img">

                <div class="control-btn">
                    <span class="btn active"></span>
                    <span class="btn"></span>
                    <span class="btn"></span>
                </div>

            </div>

            <div class="details">
                <h1>Casual T Shirt</h1>
                <h2>$15.00</h2>
                <h3>30% 0FF</h3>
                <p>Wrangler is an American manufacturerof jeans and other clothing items, particlarly workwear.</p>

                <form>
                    <div class="size-select">
                        <p>Size</p>
                        <label for="S">
                            <input type="radio" name="Size" id="S">
                            <span>S</span>
                        </label>

                        <label for="M">
                            <input type="radio" name="Size" id="M">
                            <span>M</span>
                        </label>

                        <label for="L">
                            <input type="radio" name="Size" id="L">
                            <span>L</span>
                        </label>

                        <label for="XL">
                            <input type="radio" name="Size" id="XL">
                            <span>XL</span>
                        </label>

                    </div>

                    <div class="color-select">
                        <p>Color</p>
                        <label for="red">
                            <input type="radio" name="color" id="red">
                            <span class="color-1"></span>
                        </label>


                        <label for="green">
                            <input type="radio" name="color" id="green">
                            <span class="color-2"></span>
                        </label>


                        <label for="blue">
                            <input type="radio" name="color" id="blue">
                            <span class="color-3"></span>
                        </label>


                        <label for="prink">
                            <input type="radio" name="color" id="prink">
                            <span class="color-4"></span>
                        </label>
                    </div>

                    <div class="quantity">
                        <p>Quantity</p>
                        <input type="number" value="1">
                    </div>

                    <button>Buy Now</button>

                </form>

            </div>

        </div>
    </div>


    <script>

        let produntImg = document.getElementById('product-img')
        let btn = document.getElementsByClassName('btn')


        btn[0].onclick = function () {
            produntImg.src = 'https://wrogn.com/cdn/shop/files/WTTS1538W.webp?v=1742818071';

            for (bt of btn) {
                bt.classList.remove('active')
            }
            this.classList.add('active')

        }


        btn[1].onclick = function () {
            produntImg.src = 'https://wrogn.com/cdn/shop/files/3_fb9439ca-77b0-40b7-b603-b2b325a19f56.webp?v=1742818071&width=360'


            for (bt of btn) {
                bt.classList.remove('active')
            }
            this.classList.add('active')
        }


        btn[2].onclick = function () {
            produntImg.src = 'https://wrogn.com/cdn/shop/files/5_71f4727d-0e2a-45f7-8123-88ad29b08cfe.webp?v=1742818071&width=360'


            for (bt of btn) {
                bt.classList.remove('active')
            }
            this.classList.add('active')
        }


    </script>


</body>

</html>
