<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodduct Page Desgin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contanir">
        <div class="product">
            <div class="gallery">
                <img width="280px" height="400px" src="https://wrogn.com/cdn/shop/files/WTTS1538W.webp?v=1742818071"
                    alt="">
            </div>

            <div class="details">
                <h1>Casual T Shirt</h1>
                <h2>$15.00</h2>
                <h3>30% 0FF</h3>
                <p>Wrangler is an American manufacturerof jeans and other clothing items, particlarly workwear.</p>

                <form>
                    <div class="size-select">
                        <p>Size</p>
                        <label for="S">
                            <input type="radio" name="Size" id="S">
                            <span>S</span>
                        </label>

                        <label for="M">
                            <input type="radio" name="Size" id="M">
                            <span>M</span>
                        </label>

                        <label for="L">
                            <input type="radio" name="Size" id="L">
                            <span>L</span>
                        </label>

                        <label for="XL">
                            <input type="radio" name="Size" id="XL">
                            <span>XL</span>
                        </label>

                    </div>

                    <div class="color-select">
                        <p>Color</p>
                        <label for="red">
                            <input type="radio" name="color" id="red">
                            <span class="color-1"></span>
                        </label>

                        
                        <label for="green">
                            <input type="radio" name="color" id="green">
                            <span class="color-2"></span>
                        </label>

                        
                        <label for="blue">
                            <input type="radio" name="color" id="blue">
                            <span class="color-3"></span>
                        </label>

                        
                        <label for="prink">
                            <input type="radio" name="color" id="prink">
                            <span class="color-4"></span>
                        </label>
                    </div>

                </form>

            </div>

        </div>
    </div>


</body>

</html>
